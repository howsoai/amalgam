name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Convert markdown links to Jekyll link tags
        run: |
          for file in docs/*.md; do
            sed -i -E 's|\((\./)?([^)#]+)\.md(#[^)]*)?\)|({% link \2.md %}\3)|g' "$file"
          done

      - name: Add front matter and custom head
        run: |
          # Add front matter to markdown files
          for file in docs/*.md; do
            if ! head -1 "$file" | grep -q "^---"; then
              if [ "$(basename $file)" = "index.md" ]; then
                echo -e "---\nlayout: home\n---\n$(cat $file)" > "$file"
              else
                echo -e "---\nlayout: default\n---\n$(cat $file)" > "$file"
              fi
            fi
          done

          # Create custom head for favicon
          mkdir -p docs/_includes
          cat > docs/_includes/head_custom.html << 'EOF'
          <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
          EOF

      - name: Build with Jekyll
        run: bundle exec jekyll build --source . --destination ../_site
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
